<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录浏览 - {{dirPath}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #f6f8fa; color: #24292f; }
    .toolbar { position: sticky; top: 0; z-index: 10; background: #24292f; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .toolbar .title { color: #fff; font-size: 14px; font-weight: 500; }
    .container { max-width: 1000px; margin: 24px auto; padding: 0 24px; }
    .file-list { background: #fff; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f6f8fa; padding: 12px 16px; text-align: left; font-weight: 600; border-bottom: 1px solid #d0d7de; }
    td { padding: 10px 16px; border-bottom: 1px solid #eaecef; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #f6f8fa; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .col-icon { width: 40px; }
    .col-name { }
    .col-size { width: 100px; }
    .col-time { width: 180px; }
    @media (max-width: 768px) {
      .container { padding: 0 12px; }
      .col-time { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">📂 {{dirPath}}</span>
  </div>
  <div class="container">
    <div class="file-list">
      <table>
        <thead>
          <tr>
            <th class="col-icon"></th>
            <th class="col-name">文件名</th>
            <th class="col-size">大小</th>
            <th class="col-time">修改时间</th>
          </tr>
        </thead>
        <tbody>
          {{parentLink}}
          {{rows}}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
